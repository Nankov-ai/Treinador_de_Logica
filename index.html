<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logic Gate Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
      .animate-fade-in-fast {
        animation: fadeIn 0.3s ease-in-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes slideInDown {
        from { opacity: 0; transform: translateY(-1rem); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes iconPop {
        0% { transform: scale(0.7); opacity: 0; }
        80% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-slide-in-down {
        animation: slideInDown 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }
      .animate-icon-pop {
        animation: iconPop 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }
      /* Custom Scrollbar for History Panel */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #1e293b; /* slate-800 */
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #38bdf8; /* sky-400 */
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #0ea5e9; /* sky-500 */
      }
      /* Confetti Animation */
      .confetti-piece {
        position: absolute;
        top: -20px;
        will-change: transform;
      }

      @keyframes fall {
        from {
          transform: translateY(0vh) rotate(0deg);
        }
        to {
          transform: translateY(110vh) rotate(720deg);
        }
      }
      
      /* Explanation styles for feedback */
      .explanation-incorrect {
        background-color: rgba(239, 68, 68, 0.1);
        border-left: 4px solid #ef4444;
        padding: 0.75rem 1rem;
        border-radius: 0.375rem;
        margin: 1rem 0;
      }
      .explanation-incorrect strong {
        color: #f87171;
      }
      .explanation-correct {
        background-color: rgba(34, 197, 94, 0.1);
        border-left: 4px solid #22c55e;
        padding: 0.75rem 1rem;
        border-radius: 0.375rem;
        margin: 1rem 0;
      }
      .explanation-correct strong {
        color: #4ade80;
      }
    </style>

}
</script>
